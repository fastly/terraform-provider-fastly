version: 2
updates:
  # Dependencies listed in go.mod
  - package-ecosystem: "gomod"
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    groups:
      go-dependencies:
        patterns:
          - "*"
  # Dependencies listed in tools/go.mod
  - package-ecosystem: "gomod"
    directory: "/tools"
    schedule:
      interval: "weekly"
    labels:
      - "tools"
    groups:
      tools-dependencies:
        patterns:
          - "*"
  # Dependencies listed in .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gha-dependencies:
        patterns:
          - "*"